name: Deploy Backend

on:
  push:
    branches:
      - database

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean VPS
        uses: appleboy/ssh-action@master
        with:
          host: 143.198.86.248
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/backend/nexthire
            export BRANCH=database
            git fetch origin database
            git reset --hard origin/database
            chmod +x deploy.sh
            bash deploy.sh
