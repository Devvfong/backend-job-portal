name: Deploy Backend

on:
  push:
    branches:
      - websocket

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean VPS
        uses: appleboy/ssh-action@master
        with:
          host: 143.198.86.248
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/backend/job-portal
            export BRANCH=websocket
            chmod +x deploy.sh
            ./deploy.sh
