# Allowed browser origins for API CORS (include in http {} block)
map $http_origin $cors_origin {
    default "";
    "https://nexthire.devqii.me" $http_origin;
    "https://next-hire.devqii.me" $http_origin;
    "http://localhost:3000" $http_origin;
    "http://127.0.0.1:3000" $http_origin;
}

# Only emit CORS headers when origin is whitelisted (empty $cors_origin = blocked)
map $cors_origin $cors_allow_methods {
    default "";
    "~." "GET, POST, PUT, PATCH, DELETE, OPTIONS";
}

map $cors_origin $cors_allow_headers {
    default "";
    "~." "Authorization, Content-Type, Accept, Origin, X-Requested-With";
}

map $cors_origin $cors_allow_credentials {
    default "";
    "~." "true";
}

map $cors_origin $cors_max_age {
    default "";
    "~." "86400";
}