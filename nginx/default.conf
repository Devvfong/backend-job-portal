# Rate limiting zone definition
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name api.devqii.me;

    # Hides the Nginx version number from error pages and headers
    server_tokens off;

    # Only allow specific HTTP methods
    if ($request_method !~ ^(GET|POST|PUT|DELETE|PATCH|OPTIONS)$ ) {
        return 444;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # (Optional) Content-Security-Policy - adjust according to your frontend needs
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Buffer Overflow Protection
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 10M; # Adjust if large file uploads are needed
    large_client_header_buffers 2 1k;

    # Timeout settings to mitigate Slowloris attacks
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # Proxy all requests to the backend service
    location / {
        # Apply Rate Limiting
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forwarded headers for accurate IP/Protocol tracking
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Custom Error Pages (optional but recommended for security)
    error_page 401 403 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}
