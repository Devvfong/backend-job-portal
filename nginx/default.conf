# Use Cloudflare's header for the actual client IP, not the Cloudflare Edge IP
limit_req_zone $http_cf_connecting_ip zone=api_limit:10m rate=10r/s;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name devqii.me www.devqii.me;
    
    # 301 redirect to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS Server
server {
    listen 443 ssl;
    server_name devqii.me www.devqii.me;

    # SSL Certificates
    # Since your docker-compose mounts /etc/letsencrypt, we assume Let's Encrypt is used.
    # Replace 'devqii.me' in the path below if your cert is named differently.
    ssl_certificate /etc/letsencrypt/live/devqii.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devqii.me/privkey.pem;
    
    # Recommended SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    server_tokens off;

    # 🚫 Block sensitive files
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 403;
    }

    location ~ /\. {
        deny all;
    }

    # 🚫 Limit upload size
    client_max_body_size 10M;

    # WebSocket realtime notifications
    location /ws {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # 🔁 API Proxy
    location / {
        # Enable the rate limiting defined above
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        
        # Forward Cloudflare IPs to Express
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        
        # Explicitly tell backend we are using HTTPS
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
