# Rate limit (global)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# 1. Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.devqii.me;

    # Security: Hides Nginx version
    server_tokens off;

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Secure HTTPS Server
server {
    listen 443 ssl http2;
    server_name api.devqii.me;

    ssl_certificate /etc/letsencrypt/live/api.devqii.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.devqii.me/privkey.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1440m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    server_tokens off;

    # Basic Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Buffer Overflow & Slowloris Protection
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 10M;
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # Proxy all requests to the backend service
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    error_page 401 403 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
    }
}
