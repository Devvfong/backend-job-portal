<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NextHire | Find Your Dream Career</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="description" content="NextHire connects talented job seekers with growing companies." />
  <meta property="og:title" content="NextHire" />
  <meta property="og:description" content="Find your next career move." />
  <meta property="og:image" content="/favicon.png" />
  <meta name="theme-color" content="#4A9460" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/landing.css" />
</head>

<body>
  <div class="ambient" aria-hidden="true"></div>

  <header class="site-header">
    <a class="brand" id="appLink" href="http://localhost:3000" aria-label="NextHire home">
      <img src="/logo-dark.svg" alt="" class="brand-logo" width="162" height="33" />
    </a>
    <div class="status" id="statusPill" aria-live="polite">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Checking status</span>
    </div>
  </header>

  <main class="hero">
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      Cambodia job portal
    </div>

    <h1 class="hero-title">
      Find your next
      <span class="hero-accent">dream job</span>
    </h1>

    <p class="hero-copy">
      Browse curated listings from verified companies. Apply in seconds and track
      every application — powered by the NextHire API.
    </p>

    <div class="hero-actions">
      <a class="btn btn-primary" id="jobsLink" href="http://localhost:3000/jobs">Browse jobs</a>
      <a class="btn btn-secondary" id="loginLink" href="http://localhost:3000/login">Sign in</a>
    </div>

    <section class="stats" id="statsGrid" aria-label="Platform statistics">
      <article class="stat-card">
        <div class="stat-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
          </svg>
        </div>
        <p class="stat-value" data-stat="totalJobs">—</p>
        <p class="stat-label">Active jobs</p>
      </article>

      <article class="stat-card">
        <div class="stat-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M3 21h18" />
            <path d="M5 21V7l7-4 7 4v14" />
            <path d="M9 21v-6h6v6" />
          </svg>
        </div>
        <p class="stat-value" data-stat="totalCompanies">—</p>
        <p class="stat-label">Companies</p>
      </article>

      <article class="stat-card">
        <div class="stat-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
        </div>
        <p class="stat-value" data-stat="totalUsers">—</p>
        <p class="stat-label">Job seekers</p>
      </article>

      <article class="stat-card">
        <div class="stat-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <path d="M14 2v6h6M9 15l2 2 4-4" />
          </svg>
        </div>
        <p class="stat-value" data-stat="totalApplications">—</p>
        <p class="stat-label">Applications</p>
      </article>
    </section>
  </main>

  <script src="/js/landing.js"></script>
</body>

</html>
