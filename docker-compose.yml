services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: job-portal-backend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    command: sh -c "npx prisma migrate deploy && npm start"
    networks:
      - job-portal-net

  nginx:
    image: nginx:stable-alpine
    container_name: job-portal-proxy
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - job-portal-net

networks:
  job-portal-net:
    driver: bridge
