services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: nexthire-backend
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://nexthire-redis:6379
    ports:
      - "127.0.0.1:5000:5000"
    command: sh -c "npx prisma migrate deploy && npm start"
    depends_on:
      - nexthire-redis
    networks:
      - nexthire-net

  nexthire-redis:
    image: redis:alpine
    container_name: nexthire-redis
    restart: always
    expose:
      - "6379"
    networks:
      - nexthire-net

networks:
  nexthire-net:
    driver: bridge
