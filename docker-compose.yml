services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: jp-backend
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://jp-redis:6379
    expose:
      - "3000"
    command: sh -c "npx prisma migrate deploy && npm start"
    depends_on:
      - jp-redis
    networks:
      - job-portal-net

  jp-redis:
    image: redis:alpine
    container_name: jp-redis
    restart: always
    expose:
      - "6379"
    networks:
      - job-portal-net

  nginx:
    image: nginx:stable-alpine
    container_name: jp-proxy
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - job-portal-net

networks:
  job-portal-net:
    driver: bridge
