services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: jp-backend
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://jp-redis:6379
    ports:
      - "127.0.0.1:5000:5000"
    command: sh -c "npx prisma migrate deploy && npm start"
    depends_on:
      - jp-redis
    networks:
      - job-portal-net

  jp-redis:
    image: redis:alpine
    container_name: jp-redis
    restart: always
    expose:
      - "6379"
    networks:
      - job-portal-net

networks:
  job-portal-net:
    driver: bridge
