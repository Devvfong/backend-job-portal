services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: nexthire-backend
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://nexthire-redis:6379
    ports:
      - "127.0.0.1:5000:5000"
    command: sh -c "npx prisma migrate deploy && npm start"
    depends_on:
      - db
      - nexthire-redis
    networks:
      - nexthire-net

  db:
    image: postgres:15-alpine
    container_name: nexthire-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexthire_secure_password}
      POSTGRES_DB: nexthire
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nexthire-net

  nexthire-redis:
    image: redis:alpine
    container_name: nexthire-redis
    restart: always
    expose:
      - "6379"
    networks:
      - nexthire-net

networks:
  nexthire-net:
    driver: bridge

volumes:
  pgdata:
