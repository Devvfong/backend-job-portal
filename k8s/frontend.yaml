# Build the image first from job-portal-ui repo:
#   docker build -t nexthire-ui:local --build-arg NEXT_PUBLIC_API_URL=http://localhost:30500/api/v1 .
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nexthire
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nexthire-ui:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              value: http://localhost:30500/api/v1
            - name: API_INTERNAL_URL
              value: http://backend:5000/api/v1
            - name: NEXT_PUBLIC_SITE_URL
              value: http://localhost:30300
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: nexthire
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300