apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nexthire
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: backend-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-env
          env:
            - name: NODE_ENV
              value: production
            - name: REDIS_URL
              value: redis://redis:6379
          command:
            - sh
            - -c
            - npx prisma migrate deploy && npm start
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: nexthire
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500